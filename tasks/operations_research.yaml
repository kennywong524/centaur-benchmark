replicates: 1
scaffold_model_max_tokens: null
automation_model_max_tokens: 4096
automation_worker_instruction: Complete the task clearly and professionally. Return only the final deliverable.
remote_inference_visibility: private
task_prompt: '

  You are an Operations Research (OR) Analyst at a national logistics firm that manages inventory and delivery for hundreds of retail stores.


  Delivery delays and rising fuel costs are worrying senior management. They’ve asked you to identify the key operational bottlenecks and propose data-driven strategies to improve overall efficiency.


  Your deliverable: a concise internal report (300–400 words) for executives that:

  1) Defines the data to collect and how you’d validate it (e.g., route times, vehicle utilization, demand forecasts).

  2) Outlines an analytical/optimization framework to evaluate alternate delivery schedules or warehouse allocations (e.g., linear/mixed-integer programming, simulation).

  3) Recommends at least two practical solutions that balance cost, service levels, and resource constraints. Show trade-offs and risks.

  4) Specifies KPIs to monitor (e.g., on-time rate, cost per drop, utilization), and how you’d communicate results to management.


  Write clearly, with headings and bullet points where useful. Do not assume external tools; keep it self-contained.

  '
scaffold_prompt_template: '

  You are a helpful planning coach for professionals. Your goal is to help someone think clearly and systematically before performing a complex task.


  Write a short, 250–300 word guidance message that provides a **three-phase workflow**:

  1. Requirements Check — identify what''s being asked and key constraints.

  2. Plan & Structure — outline a clear step-by-step plan or sections.

  3. Draft → Self-Review → Finalize — encourage polish and reflection.


  Keep tone professional and supportive. Do not solve the task—only guide.


  Format cleanly in Markdown under the heading:

  **Assistant Guidance: Three-Phase Workflow**

  '
worker_instruction: 'If the task prompt includes an ''Assistant Guidance: Three-Phase Workflow'' section at the top, read it carefully first and follow its planning and self-review steps before producing your response. Then complete the task itself clearly and professionally. Return only the final deliverable — do not restate the guidance.'
pairwise_task_context: '

  You are an Operations Research (OR) Analyst at a national logistics firm that manages inventory and delivery for hundreds of retail stores.


  Delivery delays and rising fuel costs are worrying senior management. They’ve asked you to identify the key operational bottlenecks and propose data-driven strategies to improve overall efficiency.


  Your deliverable: a concise internal report (300–400 words) for executives that:

  1) Defines the data to collect and how you’d validate it (e.g., route times, vehicle utilization, demand forecasts).

  2) Outlines an analytical/optimization framework to evaluate alternate delivery schedules or warehouse allocations (e.g., linear/mixed-integer programming, simulation).

  3) Recommends at least two practical solutions that balance cost, service levels, and resource constraints. Show trade-offs and risks.

  4) Specifies KPIs to monitor (e.g., on-time rate, cost per drop, utilization), and how you’d communicate results to management.


