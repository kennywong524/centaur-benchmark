slug: tax_prep
title: Tax preparation discrepancy spotting
default_worker: gpt-3.5-turbo
default_evaluator: gpt-5
replicates: 1
scaffold_model_max_tokens: null
automation_model_max_tokens: 4096
automation_worker_instruction: Complete the task clearly and professionally. Return only the final deliverable.
remote_inference_visibility: private
task_prompt: '

  A client brings you their partially completed federal and state tax returns.


  They provide the following information and documents:


  W-2 income: $68,500


  Freelance/contract income: $4,200 reported on 1099-NEC


  Mortgage interest paid: $9,800


  One dependent listed: a 22-year-old full-time college student who earned $18,000 last year


  Filing status they selected: Single


  Pre-filled portions of their Form 1040 and state return:


  Form 1040 already has their freelance income entered as $2,400


  A standard deduction amount is already typed into Line 12


  Their state tax form shows a computed tax liability that does not match the AGI shown


  All calculations were done by the client before coming to you


  Your task: In one comprehensive response, behave exactly like a professional tax preparer and do ALL of the following:


  1. Explain Applicable Federal & State Tax Rules


  Explain the federal and state tax laws relevant to:

  - reporting self-employment income

  - deductibility of mortgage interest

  - who qualifies as a dependent under IRS rules

  - the correct standard deduction for their filing status


  2. Review Their Forms and Check for Accuracy


  Examine all numbers they have provided

  - Verify arithmetic and data entry

  - Spot and explain any errors, inconsistencies, or misreported amounts

  - Recalculate income, AGI, deductions, taxable income, and estimated federal & state tax

  (Do NOT assume their entries are correct. You must detect mistakes yourself.)


  3. Provide Guidance for Correct Form Completion


  Identify which forms and schedules they actually need (e.g., Schedule C, Schedule SE, Schedule A)

  - Tell them where each item should be entered

  - Explain how to correct any issues you spotted

  - Clarify whether they should itemize or take the standard deduction


  4. Answer Client Questions and Give Preventative Advice


  Provide personalized guidance, such as:

  - whether they can legally claim the dependent

  - why federal and state figures may differ

  - how to avoid similar issues next year

  - recommendations for recordkeeping, estimated tax payments, etc.

  '
scaffold_prompt_template: '

  You are a planning coach helping another model prepare to complete a task.


  Your role is to provide PROCESS guidance only, not task content.


  Write a short 200–250 word guidance message that gives a three-phase workflow:


  1. Requirements Check

  - identify the deliverable, audience, tone, and constraints

  - note what a strong answer must include


  2. Plan & Structure

  - suggest a general response structure or sequence of sections

  - suggest how to balance completeness, clarity, and tone


  3. Draft -> Self-Review -> Finalize

  - suggest a brief checklist for revising the answer before submission


  Important rules:

  - Do NOT solve the task

  - Do NOT provide topic-specific content, examples, or recommendations

  - Do NOT write sentences that could be copied into the final answer

  - Do NOT restate the task as a completed outline with filled-in content

  - Keep the guidance generic and process-focused


  Format in Markdown under the heading:

  **Assistant Guidance: Three-Phase Workflow**

  '
worker_instruction: 'If the task prompt includes an ''Assistant Guidance: Three-Phase Workflow'' section at the top, read it carefully first and follow its planning and self-review steps before producing your response. Then complete the task itself clearly and professionally. Return only the final deliverable — do not restate the guidance.'
