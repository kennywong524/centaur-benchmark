pairwise_eval_prompt: 'You are an expert evaluator comparing two candidate responses to the same task.


  First, score each option from 1-10 on each rubric dimension below. A score of 1 means the response fails that dimension; 10 means it satisfies it excellently. Use the task-specific dimensions as primary criteria and the general dimensions as tie-breakers.


  Primary rule: prefer the response that would be more useful, accurate, complete, and reliable for the intended user. Do not reward verbosity unless it improves usefulness.


  Task-specific rubric:

  Score each of the 6 task-specific dimensions out of 10, with 1 being the lowest and 10 being the highest:


  1. Rule accuracy: respects federal and California tax rules and does not invent loopholes for self-employment income, dependent rules, mortgage interest, standard/itemized deductions, filing status, and state/federal differences.

  2. Error detection: there are 10 expected discrepancies/issues. Score according to how many are detected, with 10 issues detected = 10; 2-9 issues detected = that number; 0 or 1 issue detected = 1. Expected issues: (a) catches the $2,400 vs. $4,200 freelance mismatch; (b) identifies missing Schedule C; (c) identifies missing Schedule SE/self-employment tax; (d) identifies that $9,800 mortgage interest is not the standard deduction; (e) identifies missing Schedule A/itemization comparison; (f) identifies improper Child Tax Credit treatment for a 22-year-old; (g) analyzes possible Credit for Other Dependents instead; (h) analyzes whether Single should be changed to Head of Household if the dependent and household-cost facts qualify; (i) catches California AGI carryover inconsistency; (j) catches California tax computed from uncorrected federal figures.

  3. Calculation quality: provides income, AGI, deductions, taxable income, self-employment tax/tax estimates where possible and clearly labels assumptions or missing information.

  4. Form guidance: provides clear, easy-to-follow guidance on Schedule C, Schedule SE, Schedule A vs. standard deduction, Form 1040 placement, Schedule 2, dependent credits, filing status, and California Form 540 corrections.

  5. Dependent analysis: handles the 22-year-old full-time student with $18,000 income cautiously and correctly, including support, residency, student status, age, filing status implications, and dependent credit implications.

  6. Clear communication: translates dense tax rules into plain English so the client understands what they are paying, what must be corrected, and why.


  General rubric:

  1. Instruction following: satisfies all explicit requirements and constraints.

  2. Accuracy and specificity: avoids false claims, vague filler, and unsupported assumptions.

  3. Practical usefulness: gives concrete, usable guidance or outputs.

  4. Organization and readability: clear structure, easy to scan, appropriate formatting.

  5. Tone and audience fit: matches the role, user need, and professional context.


  After scoring, choose the better option overall based on the average score across all rubric dimensions for both options. If both are flawed, choose the one with fewer serious errors. If one response violates a hard safety, legal, medical, or dietary constraint, strongly prefer the other response unless it has an equally serious issue.


  Return valid JSON only. Include the final choice, scores for each rubric dimension for both options, the average score for both options, and a short rationale grounded in the rubric.'
pairwise:
  n_evals_per_pair: 3
  n_outer_runs: 5
