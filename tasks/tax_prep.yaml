slug: tax_prep
title: Tax preparation discrepancy spotting
default_worker: gpt-3.5-turbo
default_evaluator: gpt-4.1
replicates: 1
scaffold_model_max_tokens: 700
# GPT-5-Mini on this long prompt needs a high cap; omitting max_tokens returns a format stub.
automation_model_max_tokens: 128000
automation_worker_instruction: Complete the task clearly and professionally. Return only the final deliverable.
remote_inference_visibility: private
task_prompt: 'Assume tax year 2025 and state: California. A client brings partially completed federal and California returns. Review the provided data, identify discrepancies, explain the applicable federal/state rules, recalculate key figures using stated assumptions, and explain what forms/schedules need correction. If information is insufficient for an exact tax liability, state what is missing and provide a reasonable estimate or calculation framework.


  Client-provided facts:

  - W-2 wages: $68,500.

  - Freelance/contract income: $4,200 reported on Form 1099-NEC.

  - Business expenses for freelance work: not yet provided.

  - Mortgage interest paid on Form 1098: $9,800.

  - California property tax paid: $4,800.

  - California income tax withheld: $2,900.

  - One dependent listed: a 22-year-old full-time college student who lived with the client for 9 months. The student earned $18,000 from a part-time job; the client says the student used most earnings for savings and personal expenses, and the client paid more than half of household costs and more than half of the student''s total support.

  - Filing status selected by the client: Single.


  Pre-filled portions of the client''s federal and California returns:

  - Form 1040 includes W-2 wages of $68,500.

  - Form 1040 includes freelance income of $2,400 instead of the $4,200 shown on the 1099-NEC.

  - No Schedule C has been prepared.

  - No Schedule SE has been prepared, and no self-employment tax appears on Schedule 2.

  - Form 1040 Line 12 shows a deduction of $9,800 labeled as the standard deduction.

  - No Schedule A has been prepared even though mortgage interest, property tax, and state tax withholding are available.

  - The dependent is claimed as qualifying for the Child Tax Credit.

  - The return does not analyze whether Head of Household filing status is available.

  - California Form 540 shows federal AGI carried over as $62,000.

  - California tax was computed using the uncorrected federal income figures.


  All calculations were done by the client before coming to you. Do not assume the pre-filled entries are correct.'
scaffold_prompt_template: 'You are a planning coach helping another model prepare to complete a task.


  Your role is to provide PROCESS guidance only, not task content.


  Write a short 200-250 word guidance message that gives a three-phase workflow:


  1. Requirements Check

  - identify the deliverable, audience, tone, and constraints

  - note what a strong answer must include


  2. Plan & Structure

  - suggest a general response structure or sequence of sections

  - suggest how to balance completeness, clarity, and tone


  3. Draft -> Self-Review -> Finalize

  - suggest a brief checklist for revising the answer before submission


  Important rules:

  - Do NOT solve the task

  - Do NOT provide topic-specific content, examples, or recommendations

  - Do NOT write sentences that could be copied into the final answer

  - Do NOT restate the task as a completed outline with filled-in content

  - Keep the guidance generic and process-focused


  Format in Markdown under the heading:

  **Assistant Guidance: Three-Phase Workflow**'
worker_instruction: 'You receive internal assistant guidance plus a client task. Use the guidance for planning only; never copy or restate it. Complete the client task fully and return only the complete final deliverable.'
