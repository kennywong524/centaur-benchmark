slug: meal_plan
title: Menu planning (GDPval-style)
default_worker: gpt-3.5-turbo
default_evaluator: gpt-4.1
replicates: 1
scaffold_model_max_tokens: 700
automation_model_max_tokens: 128000
automation_worker_instruction: Complete the task clearly and professionally. Return only the final deliverable.
remote_inference_visibility: private
task_prompt: Create a cheap, simple 7-day meal plan for a 31-year-old Australian adult with shellfish and gluten allergies, lactose and onion intolerance, and preferences for meat, potatoes, Mexican, Thai, and Indian flavors. Avoid very salty or very sweet foods and account for super-taster sensitivity by using mild, adjustable seasoning. Include breakfast, lunch, dinner, and simple snacks for each day, plus a grocery list and brief prep notes. Do not include shellfish, gluten-containing ingredients, lactose-containing dairy, or onion.
scaffold_prompt_template: 'You are a planning coach helping another model prepare to complete a task.


  Your role is to provide PROCESS guidance only, not task content.


  Write a short 200-250 word guidance message that gives a three-phase workflow:


  1. Requirements Check

  - identify the deliverable, audience, tone, and constraints

  - note what a strong answer must include


  2. Plan & Structure

  - suggest a general response structure or sequence of sections

  - suggest how to balance completeness, clarity, and tone


  3. Draft -> Self-Review -> Finalize

  - suggest a brief checklist for revising the answer before submission


  Important rules:

  - Do NOT solve the task

  - Do NOT provide topic-specific content, examples, or recommendations

  - Do NOT write sentences that could be copied into the final answer

  - Do NOT restate the task as a completed outline with filled-in content

  - Keep the guidance generic and process-focused


  Format in Markdown under the heading:

  **Assistant Guidance: Three-Phase Workflow**'
worker_instruction: 'You receive internal assistant guidance plus a client task. Use the guidance for planning only; never copy or restate it. Complete the client task fully and return only the complete final deliverable.'
pairwise_task_context: Create a cheap, simple 7-day meal plan for a 31-year-old Australian adult with shellfish and gluten allergies, lactose and onion intolerance, and preferences for meat, potatoes, Mexican, Thai, and Indian flavors. Avoid very salty or very sweet foods and account for super-taster sensitivity by using mild, adjustable seasoning. Include breakfast, lunch, dinner, and simple snacks for each day, plus a grocery list and brief prep notes. Do not include shellfish, gluten-containing ingredients, lactose-containing dairy, or onion.
pairwise_eval_prompt: 'You are an expert evaluator comparing two candidate responses to the same task.


  First, score each option from 1-10 on each rubric dimension below. A score of 1 means the response fails that dimension; 10 means it satisfies it excellently. Use the task-specific dimensions as primary criteria and the general dimensions as tie-breakers.


  Primary rule: prefer the response that would be more useful, accurate, complete, and reliable for the intended user. Do not reward verbosity unless it improves usefulness.


  Task-specific rubric:

  Score each of the 6 task-specific dimensions out of 10, with 1 being the lowest and 10 being the highest:


  1. Dietary safety: strictly avoids shellfish, gluten, lactose, and onion.

  2. Preference fit: uses liked cuisines/foods while avoiding very salty/sweet flavors.

  3. Affordability: grocery list includes items that are readily available at common grocery stores and are not too expensive.

  4. Nutritional adequacy and variety: the meal plan is not too repetitive and includes healthy, wide-ranging nutritional options covering proteins, carbs, vegetables, fruits, and other macro/micronutrient needs.

  5. Simplicity and usability: easy to follow, clearly structured, and appropriate for the target audience.

  6. Completeness: covers all requirements: breakfast, lunch, dinner, simple snacks for each day, grocery list, and brief prep notes. Penalize any missing components.


  General rubric:

  1. Instruction following: satisfies all explicit requirements and constraints.

  2. Accuracy and specificity: avoids false claims, vague filler, and unsupported assumptions.

  3. Practical usefulness: gives concrete, usable guidance or outputs.

  4. Organization and readability: clear structure, easy to scan, appropriate formatting.

  5. Tone and audience fit: matches the role, user need, and professional context.


  After scoring, choose the better option overall based on the average score across all rubric dimensions for both options. If both are flawed, choose the one with fewer serious errors. If one response violates a hard safety, legal, medical, or dietary constraint, strongly prefer the other response unless it has an equally serious issue.


  Return valid JSON only. Include the final choice, scores for each rubric dimension for both options, the average score for both options, and a short rationale grounded in the rubric.'
pairwise:
  n_evals_per_pair: 3
  n_outer_runs: 1
