slug: tutoring
title: Tutoring session planning
default_worker: gpt-3.5-turbo
default_evaluator: gpt-5
replicates: 1
scaffold_model_max_tokens: null
automation_model_max_tokens: 4096
automation_worker_instruction: Complete the task clearly and professionally. Return only the final deliverable.
remote_inference_visibility: private
task_prompt: '

  You are an experienced primary school mathematics teacher preparing to teach 8-year-old Grade 3 students about fractions, focusing on helping them understand and visualize improper fractions and mixed numbers.


  In one complete, classroom-ready response, demonstrate how you would teach this topic effectively.


  You may choose your own teaching style, structure, and activities — but your response should reflect:

  • Clear understanding of mathematical content and common student misconceptions.

  • Age-appropriate explanations, examples, and analogies.

  • Use of engaging or interactive teaching techniques suited for a real classroom.

  • A warm, confident, and pedagogically sound teaching tone.


  The goal is to produce a realistic teaching response that shows both mathematical expertise and strong instructional design, as if you were actually teaching or planning this lesson for Grade 3 students.

  '
scaffold_prompt_template: '

  You are a planning coach helping another model prepare to complete a task.


  Your role is to provide PROCESS guidance only, not task content.


  Write a short 200–250 word guidance message that gives a three-phase workflow:


  1. Requirements Check

  - identify the deliverable, audience, tone, and constraints

  - note what a strong answer must include


  2. Plan & Structure

  - suggest a general response structure or sequence of sections

  - suggest how to balance completeness, clarity, and tone


  3. Draft -> Self-Review -> Finalize

  - suggest a brief checklist for revising the answer before submission


  Important rules:

  - Do NOT solve the task

  - Do NOT provide topic-specific content, examples, or recommendations

  - Do NOT write sentences that could be copied into the final answer

  - Do NOT restate the task as a completed outline with filled-in content

  - Keep the guidance generic and process-focused


  Format in Markdown under the heading:

  **Assistant Guidance: Three-Phase Workflow**

  '
worker_instruction: 'If the task prompt includes an ''Assistant Guidance: Three-Phase Workflow'' section at the top, read it carefully first and follow its planning and self-review steps before producing your response. Then complete the task itself clearly and professionally. Return only the final deliverable — do not restate the guidance.'
pairwise_task_context: '

  You are an experienced primary school mathematics teacher preparing to teach 8-year-old Grade 3 students about fractions, focusing on helping them understand and visualize improper fractions and mixed numbers.


  In one complete, classroom-ready response, demonstrate how you would teach this topic effectively.


  You may choose your own teaching style, structure, and activities — but your response should reflect:

  • Clear understanding of mathematical content and common student misconceptions.

  • Age-appropriate explanations, examples, and analogies.

  • Use of engaging or interactive teaching techniques suited for a real classroom.

  • A warm, confident, and pedagogically sound teaching tone.


  The goal is to produce a realistic teaching response that shows both mathematical expertise and strong instructional design, as if you were actually teaching or planning this lesson for Grade 3 students.

  '
pairwise_eval_prompt: '

  You are an expert evaluator simulating a thoughtful human reviewing practical work.


  You will receive:

  1. The original task request (the Grade 3 math lesson)

  2. Two candidate teaching responses


  Choose the one that is better overall for actual use.


  Consider silently:

  - Is the language, tone, and pacing genuinely age-appropriate and engaging for 8-year-old Grade 3 students?

  - Does it clearly and accurately explain the concepts of improper fractions and mixed numbers using relatable analogies or visuals?

  - Does it successfully anticipate and address common student misconceptions?

  - Are the interactive teaching techniques and activities realistic for a physical primary school classroom?

  - Does the response radiate a warm, confident, and pedagogically sound tone, like a real experienced teacher?

  - Which lesson would ultimately be more successful in helping young students grasp and visualize these math concepts?


  Return only:

  - option_1

  or

  - option_2


  No reasoning. No extra text.

  '
pairwise:
  n_evals_per_pair: 3
  n_outer_runs: 5
